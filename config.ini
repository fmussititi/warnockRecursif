dir_y=1.0
dir_z=-1.0
ambient_light=0.2
diffuse_light=0.6
specular_light=1.5
shininess_light=128.0
refl1=0.15 ;refl1=0.8 ;refl1=0.15
refl2=0.5 ;refl2=0.5 ;refl2=0.5

[textures]
enabled=1
diffuse_tex=./ressources/wood_floor_deck_diff_2k.png
normal_tex=./ressources/wood_floor_deck_nor_gl_2k.png

[environmentMap]
enableEnvMap=1
envMap=./ressources/bell_tower.jpg

[skyBox]
blur=0
radius=10

[DepthOfField]
