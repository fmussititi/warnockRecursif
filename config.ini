;sqrt(10²+10²+10²) ≈ 17
;focalDistance=-17.5
focalDistance=-8.5
focalRange=3.0
maxBlurRadius=10

[tiles]
num_threads=8
tile_size=128
max_tri_per_tile=20000
debug_tiles=0

[warnock]
tree_depth=11
contour_arbre=1
max_poly=10000