[rendu]
warnock=0
zbuffer=0
tiles=1

[resolution]
screen_width=1536
screen_height=900

[modele]
model_path=./ressources/susaneHiDef.obj

[camera]
position_x=5.0
position_y=5.0
position_z=5.0
target_x=0.0
target_y=0.0
